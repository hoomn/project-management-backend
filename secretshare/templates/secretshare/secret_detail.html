<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shared Secret</title>
</head>
<body>
    {% if reveal %}
        <h2>Secret</h2>
        <pre style="white-space: pre-wrap; word-break: break-word;">{{ content }}</pre>
        <p><strong>This secret has now been viewed and is no longer available.</strong></p>
    {% else %}
        <h2>You have received a secret</h2>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Click to reveal secret</button>
        </form>
        <p>This secret can only be viewed once.</p>
    {% endif %}
</body>
</html>
